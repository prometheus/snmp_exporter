---
name: Generator
on:
  pull_request:
  push:
    branches: [main, 'release-*']
    tags: ['v*']

permissions:
  contents: read

jobs:
  generator:
    name: Build generator
    runs-on: ubuntu-latest
    container:
      # Whenever the Go version is updated here, .promu.yml
      # should also be updated.
      image: quay.io/prometheus/golang-builder:1.26-base
    defaults:
      run:
        working-directory: ./generator
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: prometheus/promci-setup@5af30ba8c199a91d6c04ebdc3c48e630e355f62d # v0.1.0
      - run: apt-get update
      - run: apt-get -y install build-essential diffutils libsnmp-dev p7zip-full
      - run: make mibs
      - run: make generator
      - run: make parse_errors
      - run: make generate
      - run: git diff --exit-code
      - uses: prometheus/promci-artifacts/save@f9a587dbc0b2c78a0c54f8ad1cde71ea29a4b76f # v0.1.0
        with:
          directory: generator

  publish_generator_main:
    name: Publish generator main branch artifacts
    runs-on: ubuntu-latest
    permissions:
      packages: write
    needs: [generator]
    if: |
      (github.event_name == 'push' && github.event.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: prometheus/promci-setup@5af30ba8c199a91d6c04ebdc3c48e630e355f62d # v0.1.0
        with:
          enable_docker_multibuild: true
      - name: Publish Docker images
        env:
          DOCKER_IMAGE_TAG: main
          REPO_TAG: main
        run: |
          set -euo pipefail
          publish() {
            local repo="$1" login="$2" password="$3"
            local registry="${repo%%/*}"
            make -C generator docker DOCKER_REPO="$repo" DOCKER_IMAGE_TAG="$DOCKER_IMAGE_TAG" REPO_TAG="$REPO_TAG"
            echo "$password" | docker login -u "$login" --password-stdin "$registry"
            make -C generator docker-publish DOCKER_REPO="$repo" DOCKER_IMAGE_TAG="$DOCKER_IMAGE_TAG"
            make -C generator docker-tag-latest DOCKER_REPO="$repo" DOCKER_IMAGE_TAG="$DOCKER_IMAGE_TAG"
            docker push "${repo}/snmp-generator:latest"
          }
          publish docker.io/prom "${{ secrets.docker_hub_login }}" "${{ secrets.docker_hub_password }}"
          publish ghcr.io/prometheus prometheus "${{ github.token }}"
          publish quay.io/prometheus "${{ secrets.quay_io_login }}" "${{ secrets.quay_io_password }}"

  publish_generator_release:
    name: Publish generator release artefacts
    runs-on: ubuntu-latest
    permissions:
      packages: write
    needs: [generator]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: prometheus/promci-setup@5af30ba8c199a91d6c04ebdc3c48e630e355f62d # v0.1.0
        with:
          enable_docker_multibuild: true
      - name: Publish Docker images
        env:
          DOCKER_IMAGE_TAG: ${{ github.ref_name }}
          REPO_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          publish() {
            local repo="$1" login="$2" password="$3"
            local registry="${repo%%/*}"
            make -C generator docker DOCKER_REPO="$repo" DOCKER_IMAGE_TAG="$DOCKER_IMAGE_TAG" REPO_TAG="$REPO_TAG"
            echo "$password" | docker login -u "$login" --password-stdin "$registry"
            make -C generator docker-publish DOCKER_REPO="$repo" DOCKER_IMAGE_TAG="$DOCKER_IMAGE_TAG"
            if [[ "$DOCKER_IMAGE_TAG" =~ ^v[0-9]+(\.[0-9]+){2}$ ]]; then
              make -C generator docker-tag-latest DOCKER_REPO="$repo" DOCKER_IMAGE_TAG="$DOCKER_IMAGE_TAG"
              docker push "${repo}/snmp-generator:latest"
            fi
          }
          publish docker.io/prom "${{ secrets.docker_hub_login }}" "${{ secrets.docker_hub_password }}"
          publish ghcr.io/prometheus prometheus "${{ github.token }}"
          publish quay.io/prometheus "${{ secrets.quay_io_login }}" "${{ secrets.quay_io_password }}"
